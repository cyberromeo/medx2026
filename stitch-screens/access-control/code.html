<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ACADEMY - Secure Access</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

              "primary-fixed-dim": "#e6b800",

              "surface-container": "#eee9e0",

              "body": ["Inter"],
              "label": ["Space Grotesk"]
            },
            borderRadius: {"DEFAULT": "0rem", "lg": "0rem", "xl": "0rem", "full": "9999px"},
          },

      }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f5f0e8;
            color: #1a1a1a;
        }
        .bauhaus-shadow {
            box-shadow: 8px 8px 0px 0px #1a1a1a;
        }
        .bauhaus-shadow-sm {
            box-shadow: 4px 4px 0px 0px #1a1a1a;
        }
        .bauhaus-shadow-blue {
            box-shadow: 8px 8px 0px 0px #0055ff;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background min-h-screen flex flex-col items-center justify-center p-6 selection:bg-primary-container selection:text-primary">
<!-- Brand Header (Suppressed Shell for focused task) -->
<header class="fixed top-0 left-0 w-full p-8 flex justify-between items-start pointer-events-none">
<div class="bg-primary text-background p-2 border-2 border-primary bauhaus-shadow-sm pointer-events-auto">
<span class="font-headline font-black text-2xl tracking-widest uppercase">ACADEMY</span>
</div>
<div class="hidden md:block pointer-events-auto">
<div class="w-12 h-12 border-4 border-primary bg-tertiary"></div>
</div>
</header>
<main class="w-full max-w-md flex flex-col gap-12 relative z-10">
<!-- Hero Section / Title -->
<section class="flex flex-col gap-4">
<div class="relative inline-block">
<h1 class="font-headline font-black text-7xl md:text-8xl leading-none tracking-tighter text-primary break-all">
                    PASS<br/>WORD
                </h1>
<div class="absolute -bottom-2 -right-2 w-24 h-4 bg-primary-container -z-10"></div>
</div>
<p class="font-body text-lg font-medium tracking-tight max-w-[280px]">
                ACCESS THE VAULT. INPUT YOUR CREDENTIALS TO CONTINUE.
            </p>
</section>
<!-- Entry Form -->
<form class="flex flex-col gap-8 w-full" onsubmit="return false;">
<div class="relative group">
<label class="block font-headline font-bold text-sm uppercase mb-2 tracking-widest text-primary" for="password">
                    Private Key
                </label>
<div class="relative">
<input class="w-full bg-white border-4 border-primary p-5 font-headline font-bold text-2xl focus:outline-none focus:ring-0 focus:bg-primary-container transition-colors bauhaus-shadow placeholder:text-outline-variant/50" id="password" placeholder="••••••••" type="password"/>
<div class="absolute right-4 top-1/2 -translate-y-1/2 flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-3xl">lock</span>
</div>
</div>
</div>
<!-- Geometric Decorative Element (Asymmetric Bauhaus) -->
<div class="flex items-center gap-4">
<div class="h-1 bg-primary flex-grow"></div>
<div class="w-6 h-6 border-4 border-primary rounded-full"></div>
<div class="w-12 h-6 bg-secondary border-2 border-primary"></div>
</div>
<button class="group relative w-full overflow-hidden" type="submit">
<div class="absolute inset-0 bg-primary translate-x-2 translate-y-2"></div>
<div class="relative bg-tertiary border-4 border-primary p-6 flex items-center justify-between group-hover:bg-primary-container group-active:translate-x-1 group-active:translate-y-1 transition-all duration-75">
<span class="font-headline font-black text-3xl tracking-tighter text-white group-hover:text-primary">ENTER</span>
<span class="material-symbols-outlined text-4xl text-white group-hover:text-primary">arrow_forward</span>
</div>
</button>
</form>
<!-- Secondary Actions -->
<footer class="flex flex-col gap-4 pt-4">
<a class="font-headline font-bold text-sm uppercase tracking-widest text-primary flex items-center gap-2 hover:text-tertiary transition-colors" href="#">
<span class="material-symbols-outlined text-lg">help</span>
                Forgot Access Code?
            </a>
<div class="flex gap-2">
<div class="w-4 h-4 bg-secondary"></div>
<div class="w-4 h-4 bg-primary-container"></div>
<div class="w-4 h-4 bg-tertiary"></div>
</div>
</footer>
</main>
<!-- Visual Accents (Brutalist Background Elements) -->
<div class="fixed top-1/4 -left-12 w-48 h-48 border-[12px] border-primary-container/20 rounded-full -z-20"></div>
<div class="fixed bottom-10 right-10 w-32 h-32 bg-primary/5 -z-20 flex flex-wrap p-2 gap-2 overflow-hidden">
<div class="w-4 h-4 bg-primary"></div>
<div class="w-4 h-4 bg-primary"></div>
<div class="w-4 h-4 bg-primary"></div>
<div class="w-4 h-4 bg-primary"></div>
<div class="w-4 h-4 bg-primary"></div>
<div class="w-4 h-4 bg-primary"></div>
<div class="w-4 h-4 bg-primary"></div>
<div class="w-4 h-4 bg-primary"></div>
<div class="w-4 h-4 bg-primary"></div>
</div>
<!-- Background Decorative Strip -->
<div class="fixed right-0 top-0 bottom-0 w-4 bg-primary hidden md:block"></div>
<div class="fixed left-0 top-0 bottom-0 w-4 bg-tertiary hidden md:block"></div>
</body></html>
